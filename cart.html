<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Your Cart</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      .cart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 30px 8%;
      }

      .cart-header h1 {
        font-family: "Playfair Display";
        font-size: 40px;
      }

      .back-btn {
        text-decoration: none;
        color: #8b000f;
      }

      .cart-section {
        padding: 40px 8%;

        max-width: 900px;
        margin: auto;
      }

      .cart-item {
        background: #ffffff;
        border-radius: 2em;
        padding: 20px;
        margin-bottom: 20px;

        border-radius: 10px;

        display: flex;
        flex-direction: column;
        gap: 6px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
      }

      .cart-item button {
        background: #8b000f;
        color: white;

        border: none;
        padding: 8px;

        border-radius: 5px;

        cursor: pointer;

        width: 120px;
      }

      .cart-summary {
        margin-top: 40px;

        text-align: right;
      }

      .whatsapp-btn {
        background: #25d366;

        color: white;

        border: none;

        padding: 16px 30px;

        border-radius: 8px;

        font-size: 18px;

        cursor: pointer;

        margin-top: 10px;
      }
      .cart-product {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .cart-img {
        width: 90px;
        height: 90px;

        object-fit: contain;
      }

      .cart-details {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .cart-price {
        font-weight: 600;
      }
      /* ================= MOBILE CART (480px and below) ================= */

      @media (max-width: 480px) {
        /* HEADER */

        .cart-header {
          flex-direction: column;
          gap: 10px;
          text-align: center;
          padding: 20px 5%;
        }

        .cart-header h1 {
          font-size: 28px;
        }

        .back-btn {
          font-size: 14px;
        }

        /* CART SECTION */

        .cart-section {
          padding: 30px 5%;
        }

        /* CART PRODUCT LAYOUT */

        .cart-product {
          flex-direction: column;
          text-align: center;
          gap: 12px;
        }

        /* PRODUCT IMAGE */

        .cart-img {
          width: 80px;
          height: 80px;
        }

        /* CART DETAILS */

        .cart-details h3 {
          font-size: 18px;
        }

        .cart-details p {
          font-size: 14px;
        }

        /* REMOVE BUTTON */

        .cart-item button {
          width: 100%;
          padding: 10px;
          font-size: 14px;
        }

        /* SUMMARY */

        .cart-summary {
          text-align: center;
        }

        .cart-summary h2 {
          font-size: 22px;
        }

        /* WHATSAPP BUTTON */

        .whatsapp-btn {
          width: 100%;
          font-size: 16px;
          padding: 14px;
        }
      }
    </style>
  </head>

  <body>
    <header class="cart-header">
      <h1>Your Cart</h1>

      <a href="anushri-candle.html" class="back-btn">← Continue Shopping</a>
    </header>

    <section class="cart-section">
      <div id="cart-container"></div>

      <div class="cart-summary">
        <h2>Total: ₹<span id="cart-total">0</span></h2>

        <button id="whatsapp-order" class="whatsapp-btn">
          Order on WhatsApp
        </button>
      </div>
    </section>

    <script>
      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      const cartContainer = document.getElementById("cart-container");
      const totalPrice = document.getElementById("cart-total");

      function renderCart() {
        cartContainer.innerHTML = "";

        let total = 0;

        if (cart.length === 0) {
          cartContainer.innerHTML = "<p>Your cart is empty.</p>";

          totalPrice.innerText = "0";

          return;
        }

        cart.forEach((item, index) => {
          const div = document.createElement("div");

          div.classList.add("cart-item");

          div.innerHTML = `

<div class="cart-product">

<img src="${item.image}" class="cart-img">

<div class="cart-details">

<h3>${item.name}</h3>

${item.color ? `<p>Scent: ${item.color}</p>` : ""}
${item.size ? `<p>Size: ${item.size}</p>` : ""}

<p class="cart-price">Price: ₹${item.price}</p>

<button onclick="removeItem(${index})">Remove</button>

</div>

</div>

`;

          cartContainer.appendChild(div);

          total += Number(item.price);
        });

        totalPrice.innerText = total;
      }

      renderCart();

      function removeItem(index) {
        cart.splice(index, 1);

        localStorage.setItem("cart", JSON.stringify(cart));

        renderCart();
      }

      /* ---------- WHATSAPP ORDER ---------- */

      document
        .getElementById("whatsapp-order")
        .addEventListener("click", () => {
          if (cart.length === 0) {
            alert("Your cart is empty");

            return;
          }

          let message = "Hello, I would like to order:%0A%0A";

          cart.forEach((item, i) => {
            message += `${i + 1}. ${item.name}%0AColor: ${item.color}%0ASize: ${item.size}%0APrice: ₹${item.price}%0A%0A`;
          });

          let phone = "7776015296"; // change to your client's WhatsApp number

          let url = `https://wa.me/${phone}?text=${message}`;

          window.open(url, "_blank");
        });
    </script>
  </body>
</html>
